<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone Магазин</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: white;
            padding: 16px 20px;
            text-align: center;
            border-bottom: 1px solid #d2d2d7;
            font-size: 21px;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        
        .phone-card {
            background: white;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .phone-card:active {
            transform: scale(0.97);
        }
        
        .phone-card img {
            width: 100%;
            height: 260px;
            object-fit: contain;
            background: #fafafa;
            padding: 20px 10px;
        }
        
        .phone-info {
            padding: 16px;
            text-align: center;
        }
        
        .phone-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .phone-color {
            font-size: 15px;
            color: #86868b;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: flex-end;
        }
        
        .modal-content {
            background: white;
            width: 100%;
            max-height: 92%;
            border-radius: 20px 20px 0 0;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #d2d2d7;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        
        .close {
            font-size: 32px;
            line-height: 1;
            cursor: pointer;
            color: #888;
        }
        
        .modal-image {
            padding: 30px 20px 20px;
            text-align: center;
            background: #f8f9fa;
        }
        
        .modal-image img {
            width: 100%;
            max-height: 420px;
            object-fit: contain;
        }
        
        .modal-info {
            padding: 20px;
        }
        
        .color-title {
            text-align: center;
            color: #86868b;
            margin-bottom: 16px;
            font-size: 17px;
        }
        
        .color-options {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .color-dot {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        
        .color-dot:active {
            transform: scale(1.15);
        }
        
        button {
            width: 100%;
            background: #0071e3;
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 14px;
            margin-top: 10px;
        }
        
        .delivery {
            display: none;
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30,30,30,0.95);
            color: white;
            padding: 14px 28px;
            border-radius: 999px;
            font-size: 16px;
            z-index: 2000;
            box-shadow: 0 6px 25px rgba(0,0,0,0.4);
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <header>📱 Выберите iPhone</header>
    
    <div class="grid" id="grid"></div>
    
    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div id="modal-name" style="font-size:19px; font-weight:600;"></div>
                <span class="close" onclick="closeModal()">×</span>
            </div>
            <div class="modal-image">
                <img id="modal-image" src="" alt="">
            </div>
            <div class="modal-info">
                <div class="color-title">Выберите цвет</div>
                <div class="color-options" id="color-options"></div>
                
                <button onclick="addToCart()">Добавить в корзину</button>
            </div>
        </div>
    </div>
    
    <!-- Delivery notification -->
    <div id="delivery" class="delivery">
        🚚 Посылка в пути!
    </div>
    
    <script>
        const phones = [
            {
                id: 1,
                name: "iPhone 16 Pro Max",
                baseImg: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-pro-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000",
                colors: [
                    { name: "Desert Titanium", hex: "#d4b89e", img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-pro-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000" },
                    { name: "Black Titanium", hex: "#3a3a3c", img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-pro-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000" },
                    { name: "White Titanium", hex: "#f1f1f3", img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-pro-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000" }
                ]
            },
            {
                id: 2,
                name: "iPhone 16 Pro",
                baseImg: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-pro-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000",
                colors: [
                    { name: "Desert Titanium", hex: "#d4b89e", img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-pro-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000" },
                    { name: "Black Titanium", hex: "#3a3a3c", img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-pro-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000" },
                    { name: "Natural Titanium", hex: "#8e8e93", img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-pro-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000" }
                ]
            },
            {
                id: 3,
                name: "iPhone 16 Plus",
                baseImg: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000",
                colors: [
                    { name: "Ultramarine", hex: "#2a6ed1", img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000" },
                    { name: "Teal", hex: "#4ab2a3", img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000" },
                    { name: "Pink", hex: "#f8c1d4", img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000" }
                ]
            },
            {
                id: 4,
                name: "iPhone 16",
                baseImg: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000",
                colors: [
                    { name: "Black", hex: "#1c1c1e", img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000" },
                    { name: "White", hex: "#f5f5f7", img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000" },
                    { name: "Pink", hex: "#f8c1d4", img: "https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-finish-select-202409?wid=5120&hei=2880&fmt=png-alpha&.v=1725646491000" }
                ]
            }
        ];
        
        let currentPhone = null;
        
        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            phones.forEach(phone => {
                const card = document.createElement('div');
                card.className = 'phone-card';
                
                const defaultColor = phone.colors[0];
                
                card.innerHTML = `
                    <img src="${defaultColor.img}" alt="${phone.name}">
                    <div class="phone-info">
                        <div class="phone-name">${phone.name}</div>
                        <div class="phone-color">${defaultColor.name}</div>
                    </div>
                `;
                
                card.onclick = () => showModal(phone);
                grid.appendChild(card);
            });
        }
        
        function showModal(phone) {
            currentPhone = phone;
            document.getElementById('modal-name').textContent = phone.name;
            
            const img = document.getElementById('modal-image');
            img.src = phone.colors[0].img;
            
            const colorsDiv = document.getElementById('color-options');
            colorsDiv.innerHTML = '';
            
            phone.colors.forEach((color, index) => {
                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.backgroundColor = color.hex;
                dot.onclick = () => {
                    img.src = color.img;
                };
                colorsDiv.appendChild(dot);
            });
            
            document.getElementById('modal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        function addToCart() {
            closeModal();
            
            const delivery = document.getElementById('delivery');
            delivery.style.display = 'block';
            
            setTimeout(() => {
                delivery.style.display = 'none';
            }, 2800);
        }
        
        // Initialize
        window.onload = () => {
            renderGrid();
        };
        
        // Close modal if tap outside content
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
